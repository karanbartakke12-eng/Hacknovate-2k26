services:
  - type: web
    name: pune-safety-alert-api
    env: node
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile=false && pnpm build
    startCommand: node server/src/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
