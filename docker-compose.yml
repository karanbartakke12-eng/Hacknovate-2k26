services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    volumes:
      - ./server/uploads:/app/server/uploads
volumes:
  mongo-data:
